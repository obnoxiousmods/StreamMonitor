name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Ruff check
        run: |
          uv sync --group dev
          uv run ruff check .

      - name: Build binary
        run: uv run pyinstaller streammonitor.spec --noconfirm --clean

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Package release zip
        run: |
          DIR="StreamMonitor-${{ steps.version.outputs.tag }}"
          mkdir -p "$DIR"
          # Copy repo contents, filtering through .gitignore patterns
          rsync -a --exclude='.git' --filter=':- .gitignore' . "$DIR/"
          # Copy compiled binary into the package
          cp dist/streammonitor "$DIR/"
          # Create zip
          zip -r "$DIR.zip" "$DIR/"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: StreamMonitor ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          files: StreamMonitor-${{ steps.version.outputs.tag }}.zip
          generate_release_notes: true
