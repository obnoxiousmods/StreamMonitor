name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build docs site
        run: |
          mkdir -p _site/screenshots

          # Copy README as index
          cp README.md _site/index.md

          # Copy all docs
          cp docs/*.md _site/

          # Copy screenshots (referenced by README)
          cp -r docs/screenshots/* _site/screenshots/ 2>/dev/null || true

          # Fix image paths in index.md (docs/screenshots/ -> screenshots/)
          sed -i 's|docs/screenshots/|screenshots/|g' _site/index.md

          # Create Jekyll config
          cat > _site/_config.yml << 'YAML'
          title: StreamMonitor
          description: Real-time infrastructure monitoring for self-hosted media streaming stacks
          theme: jekyll-theme-midnight
          markdown: GFM
          exclude:
            - _config.yml
          YAML

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
